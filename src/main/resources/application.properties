# Server
server.port=8080

# H2 Database
spring.datasource.url=jdbc:h2:mem:doctordb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Ollama - embeddings only (chat stays on Anthropic)
spring.ai.ollama.base-url=http://localhost:11434
spring.ai.ollama.embedding.model=nomic-embed-text
spring.ai.ollama.embedding.enabled=true
spring.ai.model.embedding=ollama

# Disable Ollama chat so it doesn't conflict with Anthropic
spring.ai.ollama.chat.enabled=false

# Spring AI - Anthropic
spring.ai.anthropic.api-key=${ANTHROPIC_API_KEY}
spring.ai.anthropic.chat.options.model=claude-sonnet-4-6
spring.ai.anthropic.chat.options.max-tokens=1024
spring.ai.anthropic.chat.options.temperature=0.3

# Logging
logging.level.com.example=INFO
logging.level.org.springframework.ai=DEBUG
