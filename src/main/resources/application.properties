# Server
server.port=8080

# H2 Database
spring.datasource.url=jdbc:h2:mem:doctordb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console


# Ollama - embeddings only (chat stays on Anthropic)
spring.ai.ollama.base-url=http://localhost:11434
spring.ai.ollama.embedding.model=nomic-embed-text
spring.ai.ollama.embedding.enabled=true
spring.ai.model.embedding=ollama

spring.ai.ollama.chat.enabled=false

#spring.ai.anthropic.chat.options.max-tokens=1024
#spring.ai.anthropic.chat.options.temperature=0.6

# Spring AI - Bedrock
spring.ai.bedrock.aws.access-key=
spring.ai.bedrock.aws.secret-key=

spring.ai.model.chat=bedrock-converse
spring.ai.bedrock.aws.region=us-east-1
spring.ai.bedrock.converse.chat.options.model=amazon.nova-lite-v1:0
spring.ai.bedrock.converse.chat.options.max-tokens=1024
spring.ai.bedrock.converse.chat.options.temperature=0.6

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=
spring.mail.password=
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
spring.mail.properties.mail.debug=true

aws.ses.region=us-east-1
aws.ses.from-address=no-reply@dctrs-assist.online


# Logging
logging.level.com.example=INFO
logging.level.org.springframework.ai=DEBUG
